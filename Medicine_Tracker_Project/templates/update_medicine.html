<!DOCTYPE html>
<html>

<head>

    <title>Update Medicine</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<nav class="navbar navbar-dark bg-dark p-3">

    <div class="container-fluid">

        <span class="navbar-brand mb-0 h1">
            Update Medicine
        </span>

        <a href="/" class="btn btn-light">
            Back
        </a>

    </div>

</nav>

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="mb-4 text-center">
            Edit Medicine Details
        </h2>

        <form method="POST">

            <div class="mb-3">

                <label class="form-label">
                    Medicine Name
                </label>

                <input type="text"
                       name="name"
                       value="{{ medicine.name }}"
                       class="form-control"
                       required>

            </div>
            <div class="mb-3">

    <label class="form-label">
        Medicine Category
    </label>

    <input type="text"
           name="category"
           value="{{ medicine.category }}"
           class="form-control"
           required>

</div>


<div class="mb-3">

    <label class="form-label">
        Supplier Company
    </label>

    <input type="text"
           name="supplier"
           value="{{ medicine.supplier }}"
           class="form-control"
           required>

</div>

            <div class="mb-3">

                <label class="form-label">
                    Stock Quantity
                </label>

                <input type="number"
                       name="stock"
                       value="{{ medicine.stock }}"
                       class="form-control"
                       required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Expiry Date
                </label>

                <input type="date"
                       name="expiry"
                       value="{{ medicine.expiry }}"
                       class="form-control"
                       required>

            </div>

            <button type="submit"
                    class="btn btn-primary">

                Update Medicine

            </button>

        </form>

    </div>

</div>

</body>
</html>
