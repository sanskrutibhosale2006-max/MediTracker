<!DOCTYPE html>
<html>

<head>

    <title>Alerts</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="mb-4 text-center">
        Medicine Alerts
    </h2>

    {% if alerts %}

    <table class="table table-bordered table-hover">

        <thead class="table-dark">

            <tr>

                <th>Name</th>
                <th>Stock</th>
                <th>Expiry</th>
                <th>Status</th>

            </tr>

        </thead>

        <tbody>

            {% for item in alerts %}

            <tr>

                <td>{{ item.name }}</td>
                <td>{{ item.stock }}</td>
                <td>{{ item.expiry }}</td>
                <td>{{ item.status }}</td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

    {% else %}

    <div class="alert alert-success">

        No alerts currently.

    </div>

    {% endif %}

    <a href="/" class="btn btn-secondary">
        Back
    </a>

</div>

</body>
</html>
