<!DOCTYPE html>
<html>

<head>

    <title>Add Medicine</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container mt-5">

    <h2 class="mb-4">
        Add New Medicine
    </h2>

    <form method="POST">

        <div class="mb-3">

            <label class="form-label">
                Medicine Name
            </label>

            <input type="text"
                   name="name"
                   class="form-control"
                   required>

        </div>
        <div class="mb-3">

    <label class="form-label">
        Medicine Category
    </label>

    <input type="text"
           name="category"
           class="form-control"
           placeholder="Tablet / Syrup / Injection"
           required>

</div>


<div class="mb-3">

    <label class="form-label">
        Supplier Company
    </label>

    <input type="text"
           name="supplier"
           class="form-control"
           placeholder="Cipla / Sun Pharma"
           required>

</div>

        <div class="mb-3">

            <label class="form-label">
                Stock Quantity
            </label>

            <input type="number"
                   name="stock"
                   class="form-control"
                   required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Expiry Date
            </label>

            <input type="date"
                   name="expiry"
                   class="form-control"
                   required>

        </div>

        <button type="submit"
                class="btn btn-primary">

            Add Medicine

        </button>

        <a href="/" class="btn btn-secondary">
            Back
        </a>

    </form>

</div>

</body>
</html>
